# Base config. Experiment configs override only what differs.
experiment: base
seed: 42
output_dir: outputs
device: cuda

data:
  manifest: data/manifest.csv
  crop: potato
  image_size: 224
  fold: 0
  num_folds: 5
  batch_size: 32
  num_workers: 8
  aug_rotation: 30
  aug_translate: 0.1
  aug_scale_min: 0.8
  aug_hflip: true
  aug_vflip: true
  aug_color_jitter: 0.2
  haze_eval: false
  haze_beta: 1.5
  haze_airlight: 0.8
  dehaze_method: none

model:
  name: densenet121
  pretrained: true
  drop_rate: 0.2
  densexnet_backbone: densenet121
  densexnet_hidden: 256

optim:
  epochs: 50
  lr: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 3
  label_smoothing: 0.05
  use_class_weights: true
  early_stop_patience: 12
  mixed_precision: true
  grad_clip: 1.0

wandb:
  project: crop_disease
  entity: ashu-1069-rochester-institute-of-technology
  mode: online
  tags: []
